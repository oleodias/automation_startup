<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModernEasy Automation — Em breve</title>
  <meta name="description" content="Automação que trabalha por você. Em breve, para as empresas do Vale do Taquari." />
  <style>
    :root {
      --verde-mata: #0B3D2E;
      --verde-vivo: #1FA36C;
      --ambar: #F5A524;
      --areia: #FAF7F2;
      --cinza-verde: #9DB3AA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--verde-mata);
      color: var(--areia);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
    }
    .fundo {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.06;
      pointer-events: none;
    }
    .conteudo { position: relative; z-index: 1; max-width: 560px; }
    .simbolo { margin-bottom: 28px; }
    .simbolo svg { width: 68px; height: 68px; }
    .logo {
      font-size: clamp(2.4rem, 8vw, 3.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 18px;
    }
    .logo .modern { font-weight: 400; color: var(--areia); }
    .logo .easy { font-weight: 800; color: var(--verde-vivo); }
    .tagline {
      font-size: clamp(1.1rem, 3.5vw, 1.4rem);
      color: var(--areia);
      font-weight: 600;
      margin-bottom: 14px;
    }
    .sub {
      font-size: 1rem;
      color: var(--cinza-verde);
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .badge {
      display: inline-block;
      border: 1px solid var(--verde-vivo);
      color: var(--verde-vivo);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 999px;
      margin-bottom: 36px;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--ambar);
      color: var(--verde-mata);
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      padding: 15px 28px;
      border-radius: 12px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
    .rodape {
      margin-top: 48px;
      font-size: 0.85rem;
      color: var(--cinza-verde);
    }
  </style>
</head>
<body>

          <line x1="50" y1="30" x2="78" y2="70" />
        </g>
        <g fill="#1FA36C">
          <circle cx="22" cy="70" r="9" />

    <p class="sub">Estamos construindo soluções de automação sob medida para as empresas do Vale do Taquari. Menos trabalho manual, mais resultado.</p>
